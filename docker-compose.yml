version: '3.8'

services:
  salty-server:
    build:
      context: .
      target: runtime
    ports:
      - "5010:5010"
    volumes:
      - ./data:/usr/src/app/data
      - ./logs:/usr/src/app/logs
    environment:
      - NODE_ENV=production
      - PORT=5010
    init: true
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://0.0.0.0:5010/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - salty_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  salty_network:
    driver: bridge 