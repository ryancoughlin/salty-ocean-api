# Configure for salty-server
# points to api.saltyoffshore.com - points to conditions.saltyoffshore.com (incorrect)
# a record from IP to api.saltyoffshore.com is created in Cloudflare

version: '3.8'

services:
  salty-server:
    container_name: salty-server
    build: .
    ports:
      - "8080:5010"
    volumes:
      - ./data:/usr/src/app/data
      - ./logs:/usr/src/app/logs
    environment:
      - NODE_ENV=production
      - PORT=5010
    networks:
      - salty_network
    restart: unless-stopped

networks:
  salty_network:
    external: true
